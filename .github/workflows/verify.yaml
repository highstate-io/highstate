name: Verify

on: [ pull_request ]

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fetch all tags
        run: git fetch --unshallow --tags

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          package-manager-cache: false

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Verify
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
        run: |
          bunx nx-cloud start-ci-run --auto-apply-fixes="*test*,*biome:check*" --no-distribution
          bun run ci:prepare
          bun run ci:verify
          bunx nx-cloud stop-all-agents
